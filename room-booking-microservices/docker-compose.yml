services:
  student-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${STUDENT_DB:-student_db}
    volumes:
      - student-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${STUDENT_DB:-student_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  room-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${ROOM_DB:-room_db}
    volumes:
      - room-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${ROOM_DB:-room_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  booking-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${BOOKING_DB:-booking_db}
    volumes:
      - booking-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${BOOKING_DB:-booking_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  notification-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${NOTIFICATION_DB:-notification_db}
    volumes:
      - notification-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${NOTIFICATION_DB:-notification_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  student-service:
    build: ./student-service
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://student-db:5432/${STUDENT_DB:-student_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-admin}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-password}
    depends_on:
      student-db:
        condition: service_healthy

  room-service:
    build: ./room-service
    ports:
      - "8082:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://room-db:5432/${ROOM_DB:-room_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-admin}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-password}
    depends_on:
      room-db:
        condition: service_healthy

  notification-service:
    build: ./notification-service
    ports:
      - "8084:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://notification-db:5432/${NOTIFICATION_DB:-notification_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-admin}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-password}
    depends_on:
      notification-db:
        condition: service_healthy

  booking-service:
    build: ./booking-service
    ports:
      - "8083:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://booking-db:5432/${BOOKING_DB:-booking_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-admin}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-password}
      STUDENT_SERVICE_URL: http://student-service:8080
      ROOM_SERVICE_URL: http://room-service:8080
      NOTIFICATION_SERVICE_URL: http://notification-service:8080
    depends_on:
      booking-db:
        condition: service_healthy
      student-service:
        condition: service_started
      room-service:
        condition: service_started
      notification-service:
        condition: service_started

  frontend-service:
    build: ./frontend-service
    ports:
      - "8080:8080"
    environment:
      STUDENT_SERVICE_URL: http://student-service:8080
      ROOM_SERVICE_URL: http://room-service:8080
      BOOKING_SERVICE_URL: http://booking-service:8080
      NOTIFICATION_SERVICE_URL: http://notification-service:8080
    depends_on:
      student-service:
        condition: service_started
      room-service:
        condition: service_started
      booking-service:
        condition: service_started
      notification-service:
        condition: service_started

volumes:
  student-db-data:
  room-db-data:
  booking-db-data:
  notification-db-data:
